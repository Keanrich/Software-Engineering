<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Task</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md border border-gray-100">
        
        <div class="mb-6">
            <h1 class="text-2xl font-bold text-gray-800">Edit Task</h1>
            <p class="text-gray-500 text-sm mt-1">Update your task details</p>
        </div>

        <form method="POST" action="/edit/{{ task.id }}" class="space-y-5">
            <div>
                <label class="block font-semibold text-gray-700 mb-2">Title</label>
                <input type="text" name="title" value="{{ task.judul }}" required
                       placeholder="{{ task.judul }}"
                       class="w-full border border-gray-300 p-3 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent transition">
            </div>

            <div>
                <label class="block font-semibold text-gray-700 mb-2">Description</label>
                <textarea name="description" required
                          placeholder="Describe your task"
                          rows="4"
                          class="w-full border border-gray-300 p-3 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent transition resize-none">{{ task.deskripsi }}</textarea>
            </div>

            <div>
                <label class="block font-semibold text-gray-700 mb-2">Deadline Date</label>
                <input type="text" name="deadline_date" value="{{ task.deadline_date }}" required
                       placeholder="2025-05-05"
                       class="w-full border border-gray-300 p-3 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent transition">
                <p class="text-xs text-gray-500 mt-1">Format: YYYY-MM-DD</p>
            </div>

            <div>
                <label class="block font-semibold text-gray-700 mb-2">Category</label>
                <select name="Kategori">
                <option value="Urgent" {% if task.Kategori == 'Urgent' %}selected{% endif %}>Urgent</option>
                <option value="Important" {% if task.Kategori == 'Important' %}selected{% endif %}>Important</option>
                <option value="Reguler" {% if task.Kategori == 'Reguler' %}selected{% endif %}>Reguler</option>
                </select>

            </div>

            <div class="flex gap-3 pt-2">
                <button type="submit"
                        class="flex-1 bg-green-600 text-white px-4 py-3 rounded-lg hover:bg-green-700 font-semibold transition shadow-md hover:shadow-lg">
                    Update Task
                </button>
                <a href="/" 
                   class="flex-1 text-center bg-gray-100 text-gray-700 px-4 py-3 rounded-lg hover:bg-gray-200 font-semibold transition border border-gray-300">
                    Cancel
                </a>
            </div>

        </form>

    </div>

</body>
</html>
